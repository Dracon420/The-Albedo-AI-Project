stages:
  - build
  - release

variables:
  OUTPUT_DIR: "installer_output"
  INNO_SETUP_INSTALLER: "https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe"
  WINEDEBUG: "-all"
  DEBIAN_FRONTEND: "noninteractive"

build-installer:
  stage: build
  image: ubuntu:22.04
  before_script:
    - dpkg --add-architecture i386
    - apt-get update -y
    - apt-get install -y wine wine32 wine64 curl
    - wineboot --init
    - sleep 5
    - curl -L -o /tmp/innosetup.exe "$INNO_SETUP_INSTALLER"
    - wine /tmp/innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
    - sleep 10
  script:
    - mkdir -p $OUTPUT_DIR
    - wine "$HOME/.wine/drive_c/Program Files (x86)/Inno Setup 6/ISCC.exe" /O$OUTPUT_DIR albedo.iss
    - echo "Build complete!"
    - ls -la $OUTPUT_DIR/
  artifacts:
    paths:
      - $OUTPUT_DIR/*.exe
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_TAG'

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-installer
      artifacts: true
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Albedo AI $CI_COMMIT_TAG'
    description: 'Albedo AI installer release $CI_COMMIT_TAG'
    assets:
      links:
        - name: 'Albedo-AI-Setup.exe'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/$OUTPUT_DIR/Albedo-AI-Setup.exe?job=build-installer'
  rules:
    - if: '$CI_COMMIT_TAG'
